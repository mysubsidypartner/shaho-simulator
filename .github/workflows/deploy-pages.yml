name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment-retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Retry deploy on transient Pages failure
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        id: deployment-retry
      - name: Fail if deploy did not succeed
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: exit 1
